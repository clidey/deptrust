name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release
        id: release
        shell: bash
        run: |
          git fetch --force --tags

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            latest_tag="$(git tag --list 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
            if [[ -z "$latest_tag" ]]; then
              version="0.1.0"
            else
              latest_version="${latest_tag#v}"
              IFS=. read -r major minor _ <<< "$latest_version"
              version="$major.$((minor + 1)).0"
            fi
            tag="v$version"
            create_tag="true"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            create_tag="false"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v0.1.0; got $tag" >&2
            exit 1
          fi

          if [[ "$create_tag" == "true" ]]; then
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Release tag $tag already exists" >&2
              exit 1
            fi
          elif ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Release tag $tag does not exist in this checkout" >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "create_tag=$create_tag"
            echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31

      - name: Test
        run: go test ./...

      - name: Build release archives
        run: ./scripts/build-release.sh "${{ steps.release.outputs.tag }}" "${GITHUB_SHA::7}" "${{ steps.release.outputs.date }}"

      - name: Generate and evaluate Nix release
        shell: bash
        run: |
          set -euo pipefail
          node scripts/update-nix-flake.mjs "${{ steps.release.outputs.tag }}" dist/checksums.txt
          nix flake check --all-systems --no-build --print-build-logs
          git diff --check -- flake.nix

      - name: Generate release notes
        run: ./scripts/release-notes.sh "${{ steps.release.outputs.tag }}" dist/release-notes.md

      - name: Stamp npm package and skill version
        run: node scripts/stamp-release-version.mjs "${{ steps.release.outputs.version }}"

      - name: Pack npm installer
        run: npm pack --dry-run

      - name: Create release tag
        if: steps.release.outputs.create_tag == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "deptrust ${{ steps.release.outputs.tag }}"
          git push origin "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deptrust-${{ steps.release.outputs.tag }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/release-notes.md

      - name: Publish npm package
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: deptrust ${{ steps.release.outputs.tag }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: clidey/homebrew-tap
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret not set; skipping tap update"
            exit 0
          fi

          # Render the formula from the release checksums.
          ./scripts/generate-homebrew-formula.sh "$TAG" dist/checksums.txt dist/deptrust.rb

          tap_dir="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" "$tap_dir"

          mkdir -p "$tap_dir/Formula"
          cp dist/deptrust.rb "$tap_dir/Formula/deptrust.rb"

          git -C "$tap_dir" config user.name "github-actions[bot]"
          git -C "$tap_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tap_dir" add Formula/deptrust.rb

          if git -C "$tap_dir" diff --cached --quiet; then
            echo "Formula already up to date for $TAG"
            exit 0
          fi

          git -C "$tap_dir" commit -m "deptrust $TAG"
          git -C "$tap_dir" push origin HEAD

      - name: Commit release metadata and validated Nix flake
        shell: bash
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"
          tmp_dir="$(mktemp -d)"
          mkdir -p "$tmp_dir/skill"
          cp package.json "$tmp_dir/package.json"
          cp .agents/skills/deptrust-package-check/SKILL.md "$tmp_dir/skill/SKILL.md"

          # The release build stamped these tracked files in the tag checkout.
          # Restore them before switching to the latest default branch; the
          # stamped copies above are applied again after the checkout.
          git restore --source=HEAD --worktree package.json .agents/skills/deptrust-package-check/SKILL.md flake.nix

          git fetch origin "$default_branch"
          git checkout "$default_branch"
          git pull --ff-only origin "$default_branch"

          cp "$tmp_dir/package.json" package.json
          cp "$tmp_dir/skill/SKILL.md" .agents/skills/deptrust-package-check/SKILL.md

          node scripts/update-nix-flake.mjs "${{ steps.release.outputs.tag }}" dist/checksums.txt
          nix flake check --all-systems --print-build-logs
          nix build .#default --print-build-logs
          actual="$(nix run .#default -- version | head -n 1)"
          expected="deptrust ${{ steps.release.outputs.tag }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "Version mismatch: got '$actual', expected '$expected'" >&2
            exit 1
          fi
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .agents/skills/deptrust-package-check/SKILL.md flake.nix

          if git diff --cached --quiet; then
            echo "Source version files and Nix flake already match ${{ steps.release.outputs.tag }}"
            exit 0
          fi

          git commit -m "chore: release ${{ steps.release.outputs.tag }} [skip ci]"
          git push origin "HEAD:$default_branch"
